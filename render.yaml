services:
  # ── Combined Next.js + WebSocket server ──────────────────────────────
  - type: web
    name: vyde
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        value: wss://vyde.onrender.com
      - key: NEXT_PUBLIC_STUN_URL
        value: stun:stun.l.google.com:19302
      - key: INTERNAL_SECRET
        sync: false
