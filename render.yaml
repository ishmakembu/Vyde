services:
  # ── Next.js web app ────────────────────────────────────────────────────
  - type: web
    name: vide-web
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
      - key: NEXT_PUBLIC_STUN_URL
        value: stun:stun.l.google.com:19302

  # ── WebSocket server ───────────────────────────────────────────────────
  - type: web
    name: vide-ws
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start:ws
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_SECRET
        sync: false
